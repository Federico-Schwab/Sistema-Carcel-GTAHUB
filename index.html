        body {
            background-color: #111;

        .contenedor {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;

        .card {
            width: 250px;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
        }

        .buena {
            background-color: #1f5f2e;
            border: 3px solid #3cff77;
        }

        .mala {
            background-color: #5f1f1f;
            border: 3px solid #ff3c3c;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        img {
            border-radius: 10px;
            margin-bottom: 10px;
        }
        button:disabled {
            background-color: gray;
            cursor: not-allowed;
        }
        
        .barra-container {
    width: 100%;
    max-width: 600px;
    margin-bottom: 20px;
}

.barra-fondo {
    width: 100%;
    height: 25px;
    background-color: #222;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
}

.barra-centro {
    position: absolute;
    left: 50%;
    top: 0;
    width: 2px;
    height: 100%;
    background-color: white;
    transform: translateX(-50%);
}

.barra-izq {
    position: absolute;
    right: 50%;
    top: 0;
    height: 100%;
    width: 0%;
    background-color: red;
    transition: width 0.3s ease;
}

.barra-der {
    position: absolute;
    left: 50%;
    top: 0;
    height: 100%;
    width: 0%;
    background-color: limegreen;
    transition: width 0.3s ease;
}

#textoConducta {
    text-align: center;
    margin-top: 5px;
}

.panel-usuario{
    background:#1b1b1b;
    padding:15px;
    border-radius:10px;
    width:300px;
    margin-bottom:20px;
}

let usuario = null;

function cargarUsuario() {

    const guardado = localStorage.getItem("usuario");

    if (guardado) {
        usuario = JSON.parse(guardado);
    } else {

        let conductaInicial = parseInt(prompt("Conducta inicial (-100 a 100):"));
        if (isNaN(conductaInicial) || conductaInicial > 100 || conductaInicial < -100) {
            conductaInicial = 0;
        }

        let condenaInicial = parseInt(prompt("Minutos de condena inicial:"));
        if (isNaN(condenaInicial) || condenaInicial < 0) {
            condenaInicial = 0;
        }

        let finCondena = null;

        if (condenaInicial > 0) {
            finCondena = Date.now() + (condenaInicial * 60000);
        }

        usuario = {
            conducta: conductaInicial,
            finCondena: finCondena,
            bonos: 0,
            cooldowns: {}
        };

        guardarUsuario();
    }
}

// 🔹 FUNCIONES AUXILIARES (helpers)
function formatearTiempo(segundos) {

    let minutos = Math.floor(segundos / 60);
    let seg = segundos % 60;

    if (minutos > 0) {
        return minutos + "m " + seg + "s";
    } else {
        return seg + "s";
    }
}

// 🔹 FUNCIÓN QUE CREA LAS CARDS
function cargarMisiones() {

    let contenedor = document.getElementById("contenedor");

        // Ordenar por tipo (buena primero)
    misiones.sort(function(a, b) {
    if (a.tipo === b.tipo) return 0;
    if (a.tipo === "buena") return -1;
    return 1;
});

        // Limpiar contenedor
    for (let i = 0; i < misiones.length; i++) {

        let mision = misiones[i];

        let card = document.createElement("div");
        card.classList.add("card");
        card.classList.add(mision.tipo);

        let contenido = `
    <h3>${mision.nombre}</h3>
    <img src="${mision.imagen}" width="200" height="150">
`;

        // Mostrar atributos según tipo
if (mision.tipo === "buena") {

    contenido += `
        <p>+${mision.bonos || 0} Bonos</p>
        <p>+${mision.conducta || 0} Comportamiento</p>
    `;

    if (mision.sentencia && mision.sentencia < 0) {
        contenido += `<p>${mision.sentencia} min sentencia</p>`;
    }

} else if (mision.tipo === "mala") {

    contenido += `
        <p>${mision.conducta || 0} Respeto</p>
    `;

    if (mision.sentencia && mision.sentencia > 0) {
        contenido += `<p>+${mision.sentencia} min sentencia</p>`;
    }
}

contenido += `
    <p>CD: ${formatearTiempo(mision.cooldown)}</p>
    <button id="btn-${mision.id}" onclick="iniciarCooldown(${mision.id})">
        Iniciar
    </button>
    <p id="timer-${mision.id}"></p>
`;

card.innerHTML = contenido;

        contenedor.appendChild(card);
    }
}

// 🔹 FUNCIÓN DEL COOLDOWN
function iniciarCooldown(id) {

    let mision = misiones.find(m => m.id === id);
    let boton = document.getElementById("btn-" + id);

    if (boton.disabled) return;

    // 🔹 Conducta
    if (mision.conducta) {
        modificarConducta(mision.conducta);
    }

    // 🔹 Sentencia (minutos reales)
    if (mision.sentencia) {

        if (!usuario.finCondena || usuario.finCondena < Date.now()) {
            usuario.finCondena = Date.now();
        }

        usuario.finCondena += (mision.sentencia * 60000);

        if (usuario.finCondena < Date.now()) {
            usuario.finCondena = null;
        }
    }

    // 🔹 Bonos
    if (mision.bonos) {
        usuario.bonos += mision.bonos;
    }

    guardarUsuario();
    actualizarBarraConducta();
    iniciarRelojCondena();

    // 🔹 Cooldown
    let fin = Date.now() + (mision.cooldown * 1000);
    usuario.cooldowns[id] = fin;
    guardarUsuario();

    activarTemporizador(id, fin);
}

// 🔹 EJECUTAR AL CARGAR
cargarUsuario();

function guardarUsuario() {
    localStorage.setItem("usuario", JSON.stringify(usuario));
}

function modificarConducta(valor) {

    usuario.conducta += valor;

    if (usuario.conducta > 100) {
        usuario.conducta = 100;
    }

    if (usuario.conducta < -100) {
        usuario.conducta = -100;
    }

    guardarUsuario();
}

function actualizarBarraConducta() {

    let barraIzq = document.getElementById("barraIzq");
    let barraDer = document.getElementById("barraDer");
    let texto = document.getElementById("textoConducta");

    let valor = usuario.conducta; // -100 a 100
    texto.innerText = "Conducta: " + valor;

    let porcentaje = (Math.abs(valor) / 100) * 50;

    if (valor > 0) {
        barraDer.style.width = porcentaje + "%";
        barraIzq.style.width = "0%";
    } 
    else if (valor < 0) {
        barraIzq.style.width = porcentaje + "%";
        barraDer.style.width = "0%";
    } 
    else {
        barraIzq.style.width = "0%";
        barraDer.style.width = "0%";
    }
}

cargarMisiones();

function activarTemporizador(id, fin) {

    let boton = document.getElementById("btn-" + id);
    let timerElemento = document.getElementById("timer-" + id);

    if (!boton || !timerElemento) return;

    boton.disabled = true;
    boton.innerText = "En CD";

    let intervalo = setInterval(function() {

        let restante = fin - Date.now();

    if (restante <= 0) {

        clearInterval(intervalo);

        timerElemento.innerText = "Disponible";
        boton.disabled = false;
        boton.innerText = "Iniciar";

        delete usuario.cooldowns[id];
        guardarUsuario();

        // 🔔 sonido
        document.getElementById("sonidoCD").play();


        } else {

            timerElemento.innerText =
                "Disponible en: " + formatearTiempo(Math.floor(restante / 1000));
        }

    }, 1000);
}

function revisarCooldowns() {

    for (let i = 0; i < misiones.length; i++) {

        let id = misiones[i].id;
        let fin = usuario.cooldowns[id];

        if (fin) {

            if (fin > Date.now()) {
                activarTemporizador(id, fin);
            } else {
                delete usuario.cooldowns[id];
                guardarUsuario();
            }
        }
    }
}

function iniciarRelojCondena() {

    let reloj = document.getElementById("relojCondena");

    if (!usuario.finCondena) {
        reloj.innerText = "Sin condena";
        return;
    }

    let intervalo = setInterval(function() {

        let restante = usuario.finCondena - Date.now();

        if (restante <= 0) {
            clearInterval(intervalo);
            usuario.finCondena = null;
            guardarUsuario();
            reloj.innerText = "Condena cumplida";
        } else {
            reloj.innerText = "Condena restante: " + 
                formatearTiempo(Math.floor(restante / 1000));
        }

    }, 1000);
}

function restaurarCooldowns() {

    for (let id in usuario.cooldowns) {

        let fin = usuario.cooldowns[id];

        if (fin > Date.now()) {
            activarTemporizador(id, fin);
        } else {
            delete usuario.cooldowns[id];
        }
    }

    guardarUsuario();
}

function reiniciarUsuario() {

    if (!confirm("¿Seguro que querés reiniciar la partida?")) return;

    localStorage.removeItem("usuario");

    location.reload();
}


    
revisarCooldowns();
actualizarBarraConducta();
iniciarRelojCondena();
activarTemporizador();
restaurarCooldowns();

</script>
